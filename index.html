    <script>
      (function() {
        'use strict';
        var CACHE_KEY = 'kp_home_proxy_v4';
        var IMG_BASE = 'https://img.ophim.live/uploads/movies/';
        function getImgUrl(p) { return (!p || p.indexOf('http') === 0) ? (p || '') : IMG_BASE + p; }
        function injectPreload(url) {
          if (!url || document.querySelector('link[rel="preload"][href="' + url + '"]')) return;
          var l = document.createElement('link');
          l.rel = 'preload'; l.as = 'image'; l.fetchPriority = 'high'; l.href = url;
          document.head.appendChild(l);
        }
        function forceLoad(url) {
          if (!url) return;
          var i = new Image(); i.decoding = 'async'; i.loading = 'eager'; i.src = url;
          i.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
          function attach() {
            if (!document.body) return;
            document.body.appendChild(i);
          }
          if (document.body) attach();
          else window.addEventListener('DOMContentLoaded', attach, { once: true });
          setTimeout(function(){ if (i.parentNode) i.parentNode.removeChild(i); }, 30000);
        }
        try {
          var raw = sessionStorage.getItem(CACHE_KEY);
          if (raw) {
            var data = JSON.parse(raw);
            var sections = data && data.sections ? data.sections : data;
            var trending = (sections && sections.trending) ? sections.trending : [];
            var count = 0;
            for (var i = 0; i < trending.length && count < 1; i++) {
              var it = trending[i];
              var ep = String(it.episode_current || '').toLowerCase().trim();
              if (ep === 'trailer') continue;
              count++;
              if (it.thumb_url) {
                var heroSrc = getImgUrl(it.thumb_url);
                injectPreload(heroSrc);
                forceLoad(heroSrc);
              }
            }
          }
        } catch(e) {}
      })();
    </script>
