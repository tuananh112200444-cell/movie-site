<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450" role="img" aria-labelledby="title desc">
  <title id="title">KhoPhim poster fallback</title>
  <desc id="desc">A lightweight local fallback poster used when a movie image source is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#211421"/>
      <stop offset="0.48" stop-color="#101421"/>
      <stop offset="1" stop-color="#241016"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="70%">
      <stop offset="0" stop-color="#ef4444" stop-opacity=".36"/>
      <stop offset=".45" stop-color="#b91c1c" stop-opacity=".12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="300" height="450" rx="22" fill="url(#bg)"/>
  <rect width="300" height="450" rx="22" fill="url(#glow)"/>
  <g opacity=".16">
    <circle cx="30" cy="50" r="2.5" fill="#fff"/>
    <circle cx="82" cy="86" r="1.8" fill="#fff"/>
    <circle cx="247" cy="72" r="2" fill="#fff"/>
    <circle cx="268" cy="182" r="1.7" fill="#fff"/>
    <circle cx="42" cy="314" r="2" fill="#fff"/>
    <circle cx="244" cy="367" r="2.2" fill="#fff"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="69" y="118" width="162" height="212" rx="18" fill="#090b12" stroke="#ffffff" stroke-opacity=".13"/>
    <rect x="91" y="143" width="118" height="72" rx="10" fill="#ef4444" fill-opacity=".9"/>
    <path d="M126 238h48l26 52H100l26-52Z" fill="#ffffff" fill-opacity=".13"/>
    <circle cx="150" cy="179" r="21" fill="#fff" fill-opacity=".2"/>
  </g>
  <text x="150" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" fill="#fff">KHO PHIM</text>
  <text x="150" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#ffffff" fill-opacity=".58">DANG CAP NHAT ANH</text>
</svg>
