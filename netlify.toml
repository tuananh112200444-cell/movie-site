[build]
  publish = "out"
  command = "npm run build"

# Canonical host redirects.
[[redirects]]
  from = "https://www.khophim.org/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://mhophim.com/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.mhophim.com/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://mhophim.com/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.mhophim.com/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://khophim.org/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.khophim.org/*"
  to = "https://khophim.org/:splat"
  status = 301
  force = true

# Dynamic XML endpoints for Google. Force these so static fallback files never
# shadow the live sitemap functions.
[[redirects]]
  from = "/sitemap.xml"
  to = "https://dzpddbthdeqbkrcjlzap.supabase.co/functions/v1/sitemap-index"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-movies.xml"
  to = "https://dzpddbthdeqbkrcjlzap.supabase.co/functions/v1/sitemap-movies-xml"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-movies-dynamic"
  to = "https://dzpddbthdeqbkrcjlzap.supabase.co/functions/v1/sitemap-movies-xml"
  status = 200
  force = true

# Canonical country pages for common filter URLs.
[[redirects]]
  from = "/filter"
  to = "/phim-han-quoc"
  status = 301
  force = false
  conditions = {Query = {country = "han-quoc"}}

[[redirects]]
  from = "/filter"
  to = "/phim-trung-quoc"
  status = 301
  force = false
  conditions = {Query = {country = "trung-quoc"}}

[[redirects]]
  from = "/filter"
  to = "/phim-au-my"
  status = 301
  force = false
  conditions = {Query = {country = "au-my"}}

[[redirects]]
  from = "/filter"
  to = "/phim-nhat-ban"
  status = 301
